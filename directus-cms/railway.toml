# Volume: UI → Volume → сервис Directus, mount path = /directus/uploads
# CLI: railway volume add -m /directus/uploads
# [SERVICE_UNAVAILABLE] files / Couldn't save file: том обязателен; на томе владелец root, процесс — node →
#   Variables: RAILWAY_RUN_UID=0 (запуск от root, запись в uploads).
# Если в Variables есть STORAGE_* под S3 и ключи неверны — та же ошибка; уберите или исправьте.
# Сервис: Root Directory = directus-cms; KEY, SECRET, DB_*, PUBLIC_URL

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
requiredMountPath = "/directus/uploads"
healthcheckPath = "/server/ping"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
