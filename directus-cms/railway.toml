# Volume: UI → Volume → сервис Directus, mount path = /directus/uploads
# CLI: railway volume add -m /directus/uploads
# Файлы: том /directus/uploads + образ chown в railway-entrypoint.sh (root → su-exec node).
# Не задавайте RAILWAY_RUN_UID на не-root — иначе chown не выполнится. S3 в Variables с битыми ключами даёт ту же ошибку.
# Сервис: Root Directory = directus-cms; KEY, SECRET, DB_*, PUBLIC_URL

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
requiredMountPath = "/directus/uploads"
healthcheckPath = "/server/ping"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
