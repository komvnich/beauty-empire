# Volume: в UI — Volume → привязать к сервису Directus, mount path = /directus/uploads
# CLI (из каталога с привязанным проектом): railway volume add -m /directus/uploads
# Права: при ошибках записи в uploads задайте RAILWAY_RUN_UID=0
# Сервис: Root Directory = directus-cms; KEY, SECRET, DB_*, PUBLIC_URL

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
requiredMountPath = "/directus/uploads"
healthcheckPath = "/server/ping"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
